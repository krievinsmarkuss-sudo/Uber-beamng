<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>Riga Ride Mobile Fixed</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      font-family: Arial, sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: #000;
      color: #fff;
    }

    #map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      z-index: 1;
      background: #111;
    }

    .top-bar {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top));
      left: 10px;
      right: 10px;
      z-index: 99999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .logo,
    .earnings {
      background: rgba(0, 0, 0, 0.92);
      border: 1px solid #222;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 900;
      box-shadow: 0 8px 25px rgba(0,0,0,.5);
      pointer-events: auto;
    }

    .logo span {
      color: #06c167;
    }

    .bottom-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 99999;
      background: #000;
      border: 1px solid #222;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      padding: 10px 14px calc(14px + env(safe-area-inset-bottom));
      box-shadow: 0 -18px 60px rgba(0,0,0,.75);
      max-height: 52dvh;
      overflow-y: auto;
      transition: transform 0.25s ease;
    }

    .bottom-sheet.collapsed {
      transform: translateY(calc(100% - 92px));
    }

    .handle {
      width: 48px;
      height: 5px;
      border-radius: 999px;
      background: #333;
      margin: 0 auto 10px;
    }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .sheet-title {
      font-size: 20px;
      font-weight: 900;
    }

    .online {
      background: #06c167;
      color: #000;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 900;
    }

    .address-card {
      background: #101010;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 13px;
      margin-bottom: 10px;
    }

    .address-row {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .address-row:last-child {
      margin-bottom: 0;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-top: 3px;
    }

    .pickup-dot {
      background: #06c167;
    }

    .dropoff-dot {
      background: #fff;
    }

    .label {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 3px;
    }

    .place {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat {
      background: #101010;
      border: 1px solid #222;
      border-radius: 15px;
      padding: 9px 6px;
      text-align: center;
    }

    .stat-value {
      font-size: 14px;
      font-weight: 900;
    }

    .buttons {
      display: grid;
      gap: 9px;
    }

    button {
      width: 100%;
      min-height: 52px;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary {
      background: #06c167;
      color: #000;
    }

    .secondary {
      background: #fff;
      color: #000;
    }

    .danger {
      background: #1f1f1f;
      color: #fff;
      border: 1px solid #333;
    }

    .mini-button {
      min-height: 38px;
      font-size: 13px;
      background: #161616;
      color: #fff;
      border: 1px solid #333;
      margin-bottom: 8px;
    }

    .map-status {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(52dvh + 12px);
      z-index: 99998;
      background: rgba(0,0,0,.9);
      border: 1px solid #222;
      border-radius: 18px;
      padding: 10px 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
    }

    .map-status strong {
      display: block;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .map-status span {
      color: #aaa;
      font-size: 12px;
    }

    .car-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #000;
      border: 5px solid #06c167;
      display: grid;
      place-items: center;
      font-size: 23px;
      box-shadow: 0 10px 25px rgba(0,0,0,.5);
    }

    .pickup-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #06c167;
      border: 5px solid #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,.4);
    }

    .dropoff-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid #000;
      box-shadow: 0 10px 25px rgba(0,0,0,.4);
    }

    .leaflet-control-zoom {
      margin-bottom: 210px !important;
    }

    .leaflet-control-attribution {
      font-size: 9px;
    }

    @media (max-height: 720px) {
      .bottom-sheet {
        max-height: 58dvh;
      }

      .map-status {
        display: none;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="top-bar">
    <div class="logo">Riga<span>Ride</span></div>
    <div class="earnings" id="earnings">€0.00</div>
  </div>

  <div class="map-status">
    <strong id="mapStatus">Rīgas karte</strong>
    <span id="mapInfo">OSM karte + maršruts pa ceļiem</span>
  </div>

  <div class="bottom-sheet" id="bottomSheet">
    <div class="handle"></div>

    <button class="mini-button" onclick="togglePanel()">Samazināt / Atvērt paneli</button>

    <div class="sheet-header">
      <div class="sheet-title">Pasūtījums</div>
      <div class="online">ONLINE</div>
    </div>

    <div class="address-card">
      <div class="address-row">
        <div class="dot pickup-dot"></div>
        <div>
          <div class="label">Paņemšana</div>
          <div class="place" id="pickupText">Spied “Jauns pasūtījums”</div>
        </div>
      </div>

      <div class="address-row">
        <div class="dot dropoff-dot"></div>
        <div>
          <div class="label">Galamērķis</div>
          <div class="place" id="dropoffText">Maršruts parādīsies kartē</div>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="label">Attālums</div>
        <div class="stat-value" id="distance">—</div>
      </div>

      <div class="stat">
        <div class="label">Laiks</div>
        <div class="stat-value" id="duration">—</div>
      </div>

      <div class="stat">
        <div class="label">Cena</div>
        <div class="stat-value" id="price">—</div>
      </div>

      <div class="stat">
        <div class="label">Klients</div>
        <div class="stat-value" id="passenger">—</div>
      </div>
    </div>

    <div class="buttons">
      <button class="primary" onclick="newOrder()">Jauns pasūtījums</button>
      <button class="secondary" onclick="acceptOrder()">Pieņemt braucienu</button>
      <button class="danger" onclick="finishOrder()">Pabeigt braucienu</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const rigaPlaces = [
      { name: "Rīgas Centrālā stacija", lat: 56.9475, lng: 24.1202 },
      { name: "Brīvības piemineklis", lat: 56.9515, lng: 24.1133 },
      { name: "Vecrīga", lat: 56.9496, lng: 24.1052 },
      { name: "Origo", lat: 56.9479, lng: 24.1209 },
      { name: "Āgenskalna tirgus", lat: 56.9362, lng: 24.0718 },
      { name: "Spice", lat: 56.9285, lng: 24.0174 },
      { name: "Akropole Rīga", lat: 56.9234, lng: 24.1752 },
      { name: "Domina Shopping", lat: 56.9664, lng: 24.1633 },
      { name: "Alfa", lat: 56.9849, lng: 24.2028 },
      { name: "Mežaparks", lat: 57.0054, lng: 24.1586 },
      { name: "Rīgas Zooloģiskais dārzs", lat: 57.0065, lng: 24.1592 },
      { name: "Dailes teātris", lat: 56.9607, lng: 24.1247 },
      { name: "Latvijas Nacionālā bibliotēka", lat: 56.9410, lng: 24.0964 },
      { name: "Ķīpsala", lat: 56.9498, lng: 24.0830 },
      { name: "Skanste", lat: 56.9695, lng: 24.1198 },
      { name: "Jugla", lat: 56.9867, lng: 24.2450 },
      { name: "Ziepniekkalns", lat: 56.8997, lng: 24.0986 },
      { name: "Purvciems", lat: 56.9580, lng: 24.1830 },
      { name: "Teika", lat: 56.9774, lng: 24.1827 },
      { name: "Imanta", lat: 56.9562, lng: 24.0004 },
      { name: "Pļavnieki", lat: 56.9390, lng: 24.2045 },
      { name: "Bolderāja", lat: 57.0327, lng: 24.0375 },
      { name: "Vecmīlgrāvis", lat: 57.0343, lng: 24.1015 }
    ];

    const passengers = [
      "Anna", "Mārtiņš", "Roberts", "Laura", "Elīna",
      "Kristaps", "Sofija", "Rihards", "Paula", "Dāvis"
    ];

    let currentOrder = null;
    let routeLine = null;
    let pickupMarker = null;
    let dropoffMarker = null;
    let earnings = 0;

    const map = L.map("map", {
      zoomControl: false,
      tap: true
    }).setView([56.9496, 24.1052], 12);

    L.control.zoom({ position: "bottomright" }).addTo(map);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const carIcon = L.divIcon({
      html: `<div class="car-icon">🚗</div>`,
      className: "",
      iconSize: [42, 42],
      iconAnchor: [21, 21]
    });

    const pickupIcon = L.divIcon({
      html: `<div class="pickup-icon"></div>`,
      className: "",
      iconSize: [34, 34],
      iconAnchor: [17, 17]
    });

    const dropoffIcon = L.divIcon({
      html: `<div class="dropoff-icon"></div>`,
      className: "",
      iconSize: [34, 34],
      iconAnchor: [17, 17]
    });

    const driverMarker = L.marker([56.9496, 24.1052], {
      icon: carIcon
    }).addTo(map);

    function togglePanel() {
      document.getElementById("bottomSheet").classList.toggle("collapsed");

      setTimeout(() => {
        map.invalidateSize();
        fitCurrentRoute();
      }, 300);
    }

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function formatKm(meters) {
      return (meters / 1000).toFixed(1) + " km";
    }

    function formatMin(seconds) {
      return Math.round(seconds / 60) + " min";
    }

    function fitCurrentRoute() {
      if (routeLine) {
        map.fitBounds(routeLine.getBounds(), {
          paddingTopLeft: [35, 90],
          paddingBottomRight: [35, 300]
        });
      }
    }

    function clearRoute() {
      if (routeLine) map.removeLayer(routeLine);
      if (pickupMarker) map.removeLayer(pickupMarker);
      if (dropoffMarker) map.removeLayer(dropoffMarker);

      routeLine = null;
      pickupMarker = null;
      dropoffMarker = null;
    }

    async function getRoute(from, to) {
      const url =
        `https://router.project-osrm.org/route/v1/driving/` +
        `${from.lng},${from.lat};${to.lng},${to.lat}` +
        `?overview=full&geometries=geojson`;

      const res = await fetch(url);
      const data = await res.json();

      if (!data.routes || !data.routes.length) {
        throw new Error("Maršrutu nevarēja aprēķināt.");
      }

      return data.routes[0];
    }

    async function drawRoute(from, to) {
      try {
        document.getElementById("mapStatus").textContent = "Aprēķina maršrutu...";
        document.getElementById("mapInfo").textContent = "Maršruts tiek zīmēts pa Rīgas ceļiem";

        const route = await getRoute(from, to);

        if (routeLine) map.removeLayer(routeLine);

        const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);

        routeLine = L.polyline(coords, {
          weight: 8,
          opacity: 0.95,
          color: "#06c167"
        }).addTo(map);

        fitCurrentRoute();

        document.getElementById("distance").textContent = formatKm(route.distance);
        document.getElementById("duration").textContent = formatMin(route.duration);

        const price = Math.max(
          4,
          2.5 + route.distance / 1000 * 0.95 + route.duration / 60 * 0.12
        );

        document.getElementById("price").textContent = "€" + price.toFixed(2);

        currentOrder.distance = route.distance;
        currentOrder.duration = route.duration;
        currentOrder.price = price;

        document.getElementById("mapStatus").textContent = "Maršruts gatavs";
        document.getElementById("mapInfo").textContent = "Brauciens pa īstiem Rīgas ceļiem";

      } catch (err) {
        alert("Kļūda: " + err.message);
      }
    }

    async function newOrder() {
      clearRoute();

      let pickup = randomItem(rigaPlaces);
      let dropoff = randomItem(rigaPlaces);

      while (dropoff.name === pickup.name) {
        dropoff = randomItem(rigaPlaces);
      }

      currentOrder = {
        pickup,
        dropoff,
        passenger: randomItem(passengers),
        accepted: false
      };

      document.getElementById("pickupText").textContent = pickup.name;
      document.getElementById("dropoffText").textContent = dropoff.name;
      document.getElementById("passenger").textContent = currentOrder.passenger;
      document.getElementById("distance").textContent = "—";
      document.getElementById("duration").textContent = "—";
      document.getElementById("price").textContent = "—";

      pickupMarker = L.marker([pickup.lat, pickup.lng], {
        icon: pickupIcon
      }).addTo(map);

      dropoffMarker = L.marker([dropoff.lat, dropoff.lng], {
        icon: dropoffIcon
      }).addTo(map);

      await drawRoute(pickup, dropoff);
    }

    function acceptOrder() {
      if (!currentOrder) {
        alert("Vispirms izveido jaunu pasūtījumu.");
        return;
      }

      currentOrder.accepted = true;

      document.getElementById("mapStatus").textContent = "Brauciens pieņemts";
      document.getElementById("mapInfo").textContent = "Maršruta līnija paliek kartē";

      fitCurrentRoute();
    }

    function finishOrder() {
      if (!currentOrder) {
        alert("Nav aktīva pasūtījuma.");
        return;
      }

      if (!currentOrder.accepted) {
        alert("Vispirms pieņem braucienu.");
        return;
      }

      driverMarker.setLatLng([
        currentOrder.dropoff.lat,
        currentOrder.dropoff.lng
      ]);

      earnings += currentOrder.price || 0;
      document.getElementById("earnings").textContent = "€" + earnings.toFixed(2);

      clearRoute();

      document.getElementById("pickupText").textContent = "Spied “Jauns pasūtījums”";
      document.getElementById("dropoffText").textContent = "Maršruts parādīsies kartē";
      document.getElementById("distance").textContent = "—";
      document.getElementById("duration").textContent = "—";
      document.getElementById("price").textContent = "—";
      document.getElementById("passenger").textContent = "—";

      document.getElementById("mapStatus").textContent = "Brauciens pabeigts";
      document.getElementById("mapInfo").textContent = "Nauda pieskaitīta peļņai";

      currentOrder = null;
    }

    window.addEventListener("resize", () => {
      setTimeout(() => {
        map.invalidateSize();
        fitCurrentRoute();
      }, 300);
    });

    setTimeout(() => {
      map.invalidateSize();
      newOrder();
    }, 500);
  </script>
</body>
</html>
